<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Font families */
      --font-ui: 'Figtree', sans-serif;
      --font-prompt: 'Amatic SC', cursive;

      /* Color — notebook B&W */
      --color-bg: #FAFAF8;
      --color-surface: #FFFFFF;
      --color-text: #1A1A1A;
      --color-text-muted: #6B6B6B;
      --color-text-subtle: #9A9A9A;
      --color-border: #E0E0DC;
      --color-border-strong: #C8C8C4;
      --color-btn-primary-bg: #1A1A1A;
      --color-btn-primary-text: #FAFAF8;
      --color-btn-secondary-bg: transparent;
      --color-btn-secondary-text: #1A1A1A;
      --color-btn-disabled-bg: #E8E8E4;
      --color-btn-disabled-text: #9A9A9A;

      /* Deck indicator colors */
      --deck-inspiration: #C8973A;
      --deck-connections: #4A8C6F;
      --deck-interfacing: #4A7FA5;
      --deck-thread: #C86E3A;
      --deck-indicator-size: 11px;

      /* Buddy card — shared portrait ratio (120×170); scaled sizes per view */
      --buddy-card-ratio: 120 / 170;
      --buddy-card-deck-w: 120px;
      --buddy-card-deck-h: 170px;
      --buddy-card-prompt-w: 216px;
      --buddy-card-prompt-h: 306px;
      --deck-grid-gap: var(--space-sm);
      --deck-grid-w: calc(var(--buddy-card-deck-w) * 2 + var(--deck-grid-gap));

      /* Spacing */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 24px;
      --space-2xl: 32px;

      /* Typography scale */
      --text-xs: 10px;
      --text-sm: 12px;
      --text-base: 14px;
      --text-md: 16px;
      --text-lg: 20px;
      --text-xl: 24px;
      --text-2xl: 28px;

      --weight-regular: 400;
      --weight-medium: 500;
      --weight-semibold: 600;

      --leading-tight: 1.2;
      --leading-normal: 1.5;
      --leading-relaxed: 1.65;

      /* Radii */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(26, 26, 26, 0.06);
      --shadow-md: 0 2px 8px rgba(26, 26, 26, 0.08);
      --shadow-card: 0 1px 3px rgba(26, 26, 26, 0.06), 0 4px 12px rgba(26, 26, 26, 0.04);

      /* Motion */
      --duration-fast: 150ms;
      --duration-normal: 250ms;
      --duration-slow: 400ms;
      --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-in-out: cubic-bezier(0.42, 0, 0.58, 1);
      --reveal-distance: 8px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: var(--weight-regular);
      line-height: var(--leading-normal);
      color: var(--color-text);
      background-color: var(--color-bg);
      -webkit-font-smoothing: antialiased;
    }

    .text-title {
      font-family: var(--font-ui);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      line-height: var(--leading-tight);
      color: var(--color-text);
    }

    .text-body {
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: var(--weight-regular);
      line-height: var(--leading-normal);
      color: var(--color-text);
    }

    .text-prompt {
      font-family: var(--font-prompt);
      font-size: var(--text-2xl);
      font-weight: 700;
      line-height: var(--leading-tight);
      color: var(--color-text);
    }

    .text-muted {
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: var(--weight-regular);
      line-height: var(--leading-normal);
      color: var(--color-text-muted);
    }

    .text-label {
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      line-height: var(--leading-normal);
      color: var(--color-text);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      line-height: var(--leading-normal);
      padding: var(--space-sm) var(--space-lg);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background-color var(--duration-fast) var(--ease-out),
                  color var(--duration-fast) var(--ease-out),
                  opacity var(--duration-fast) var(--ease-out);
    }

    .btn-primary {
      background-color: var(--color-btn-primary-bg);
      color: var(--color-btn-primary-text);
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.85;
    }

    .btn-secondary {
      background-color: var(--color-btn-secondary-bg);
      color: var(--color-btn-secondary-text);
      border: 1px solid var(--color-border-strong);
    }

    .btn-secondary:hover:not(:disabled) {
      background-color: var(--color-surface);
    }

    .btn:disabled {
      background-color: var(--color-btn-disabled-bg);
      color: var(--color-btn-disabled-text);
      border-color: transparent;
      cursor: not-allowed;
      opacity: 1;
    }

    .btn-full {
      width: 100%;
    }

    .btn-with-icon {
      gap: var(--space-sm);
    }

    .btn-with-icon svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .textarea-reflection {
      display: block;
      width: 100%;
      min-height: 120px;
      padding: var(--space-md) 0;
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: var(--weight-regular);
      line-height: var(--leading-relaxed);
      color: var(--color-text);
      background-color: transparent;
      border: none;
      border-bottom: 1px solid var(--color-border);
      border-radius: 0;
      resize: none;
      outline: none;
    }

    .textarea-reflection::placeholder {
      color: var(--color-text-subtle);
    }

    .textarea-reflection:focus {
      border-bottom-color: var(--color-border-strong);
    }

    /* Buddy card — base component (fixed ratio on every variant) */
    .buddy-card {
      position: relative;
      box-sizing: border-box;
      width: var(--buddy-card-deck-w);
      height: var(--buddy-card-deck-h);
      aspect-ratio: var(--buddy-card-ratio);
      flex-shrink: 0;
      overflow: hidden;
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
    }

    .buddy-card--deck {
      width: var(--buddy-card-deck-w);
      height: var(--buddy-card-deck-h);
      min-width: var(--buddy-card-deck-w);
      min-height: var(--buddy-card-deck-h);
      max-width: var(--buddy-card-deck-w);
      max-height: var(--buddy-card-deck-h);
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
      text-align: left;
      font: inherit;
      cursor: pointer;
      transition: box-shadow var(--duration-normal) var(--ease-out),
                  border-color var(--duration-normal) var(--ease-out),
                  transform var(--duration-fast) var(--ease-out);
    }

    .buddy-card--deck:hover {
      border-color: var(--color-border-strong);
      box-shadow: var(--shadow-md);
    }

    .buddy-card--prompt {
      width: var(--buddy-card-prompt-w);
      height: var(--buddy-card-prompt-h);
      min-width: var(--buddy-card-prompt-w);
      min-height: var(--buddy-card-prompt-h);
      max-width: var(--buddy-card-prompt-w);
      max-height: var(--buddy-card-prompt-h);
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .buddy-card__badge {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: calc(100% - 20px);
    }

    .buddy-card__badge .deck-indicator {
      width: 12px;
      height: 12px;
    }

    .buddy-card__badge-label {
      margin: 0;
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: var(--weight-medium);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .buddy-card__body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      padding: 28px 14px 14px;
      overflow: hidden;
    }

    .buddy-card--deck .buddy-card__body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      padding: 0;
      overflow: hidden;
    }

    .buddy-card__prompt-wrap,
    .card-flip__back-text-wrap {
      flex: 1;
      min-height: 0;
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .buddy-card__prompt {
      margin: 0;
      width: 100%;
      display: block;
      text-align: center;
      font-family: var(--font-prompt);
      font-weight: 700;
      line-height: 1.12;
      color: var(--color-text);
      overflow: visible;
      word-break: break-word;
      overflow-wrap: break-word;
      hyphens: auto;
    }

    /* Card flip — View 2b context on back */
    .card-flip.buddy-card--prompt {
      background: transparent;
      border: none;
      box-shadow: none;
      perspective: 900px;
    }

    .card-flip__inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 550ms var(--ease-in-out);
    }

    .card-flip--flipped .card-flip__inner {
      transform: rotateY(180deg);
    }

    .card-flip__face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      background-color: var(--color-surface);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .card-flip__back {
      transform: rotateY(180deg);
    }

    .card-flip__face .buddy-card__body {
      height: 100%;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      padding: 28px 12px 12px;
      gap: var(--space-sm);
    }

    .card-flip__face .buddy-card__badge {
      z-index: 2;
    }

    .card-flip__context-btn {
      flex-shrink: 0;
      width: 100%;
      font-size: var(--text-xs);
      padding: var(--space-xs) var(--space-sm);
    }

    .card-flip__context-btn--hidden {
      display: none;
    }

    .card-flip__back-label {
      margin: 0;
      flex-shrink: 0;
      font-family: var(--font-ui);
      font-size: 9px;
      font-weight: var(--weight-semibold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      text-align: center;
    }

    .card-flip__back-text {
      margin: 0;
      width: 100%;
      display: block;
      font-family: var(--font-ui);
      line-height: 1.2;
      color: var(--color-text-muted);
      text-align: center;
      overflow: visible;
      word-break: break-word;
      overflow-wrap: break-word;
      hyphens: auto;
    }

    .context-box {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }

    .context-box--hidden {
      display: none;
    }

    .context-box__title {
      margin: 0;
      font-family: var(--font-ui);
      font-size: 9px;
      font-weight: var(--weight-semibold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .context-box__text {
      margin: 0;
      font-family: var(--font-ui);
      font-size: var(--text-xs);
      line-height: var(--leading-normal);
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background-color: var(--color-bg);
      padding: 6px;
      overflow: visible;
    }

    .buddy-card__deck-desc {
      margin: 4px 0 0;
      font-size: 9px;
      line-height: 1.25;
      color: var(--color-text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .deck-label {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .deck-indicator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--deck-indicator-size);
      height: var(--deck-indicator-size);
      flex-shrink: 0;
    }

    .deck-indicator svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .transition-base {
      transition: opacity var(--duration-normal) var(--ease-out),
                  transform var(--duration-normal) var(--ease-out);
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(var(--reveal-distance));
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reveal {
      animation: reveal var(--duration-slow) var(--ease-out) both;
    }

    .view {
      position: relative;
      width: 100%;
      height: 100%;
      padding: var(--space-xl) var(--space-lg);
      overflow: hidden;
    }

    .view--hidden {
      display: none !important;
    }

    /* Loading screen */
    .loading-screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--color-bg);
      z-index: 10;
      opacity: 1;
      transition: opacity var(--duration-slow) var(--ease-out);
    }

    .loading-screen--done {
      opacity: 0;
      pointer-events: none;
    }

    .loading-shapes {
      position: relative;
      width: 64px;
      height: 64px;
    }

    .loading-shape {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      margin: -6px 0 0 -6px;
      animation: orbit 1.5s var(--ease-in-out) infinite;
    }

    .loading-shape svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .loading-shape--triangle { animation-delay: 0s; color: var(--deck-inspiration); }
    .loading-shape--hexagon { animation-delay: -0.375s; color: var(--deck-connections); }
    .loading-shape--square { animation-delay: -0.75s; color: var(--deck-interfacing); }
    .loading-shape--dot { animation-delay: -1.125s; color: var(--deck-thread); }

    @keyframes orbit {
      0%, 100% {
        transform: rotate(0deg) translateX(22px) rotate(0deg);
        opacity: 0.35;
      }
      25% {
        opacity: 1;
      }
      50% {
        transform: rotate(180deg) translateX(22px) rotate(-180deg);
        opacity: 0.35;
      }
      75% {
        opacity: 1;
      }
    }

    /* View 1 — Anchor */
    .view-1 {
      display: flex;
      flex-direction: column;
    }

    .view-1__content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      min-height: 0;
      padding-bottom: var(--space-2xl);
    }

    .view-1__heading {
      margin: 0;
      font-family: var(--font-ui);
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      line-height: var(--leading-tight);
      color: var(--color-text);
    }

    .view-1__subtext {
      margin: 0;
      text-align: left;
    }

    .view-1__pick--hidden,
    .view-1__selected--hidden {
      display: none;
    }

    .view-1__pick {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      align-items: stretch;
    }

    .view-1__pick .btn-primary {
      width: 100%;
      cursor: default;
      pointer-events: none;
    }

    .view-1__cta {
      margin: 0;
      text-align: center;
    }

    .view-1__hint {
      margin: 0;
      text-align: left;
    }

    .view-1__hint--error {
      color: var(--color-text-subtle);
    }

    .view-1__hint--hidden {
      display: none;
    }

    .view-1__selected {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      min-height: 0;
    }

    .frame-preview {
      width: 100%;
      max-height: 160px;
      min-height: 120px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background-color: var(--color-surface);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-md);
      gap: var(--space-sm);
    }

    .frame-preview__thumb {
      flex: 1;
      width: 100%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--color-bg);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .frame-preview__thumb img {
      display: block;
      width: 100%;
      max-height: 160px;
      object-fit: contain;
    }

    .frame-preview__icon {
      width: 48px;
      height: 48px;
      color: var(--color-text-subtle);
    }

    .frame-preview__meta {
      margin: 0;
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      text-align: center;
    }

    .frame-preview__name {
      margin: 0;
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--color-text-muted);
      text-align: center;
      word-break: break-word;
    }

    .frame-preview__name--hidden {
      display: none;
    }

    .view-1__name-label {
      margin: 0;
    }

    .anchor-input {
      display: block;
      width: 100%;
      padding: var(--space-sm) 0;
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: var(--weight-medium);
      line-height: var(--leading-normal);
      color: var(--color-text);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--color-border-strong);
      outline: none;
    }

    .anchor-input::placeholder {
      color: var(--color-text-subtle);
    }

    .text-btn {
      align-self: flex-start;
      padding: 0;
      border: none;
      background: none;
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: var(--weight-regular);
      color: var(--color-text-muted);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .text-btn:hover {
      color: var(--color-text);
    }

    /* View 2 — Draw (deck pick) */
    .view-2,
    .view-2b {
      display: flex;
      flex-direction: column;
    }

    .view-2.view {
      padding-top: var(--space-md);
      padding-bottom: var(--space-md);
    }

    .view-2b.view {
      display: flex;
      flex-direction: column;
      padding: var(--space-md) var(--space-lg);
    }

    .view-2__body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 0;
      overflow: hidden;
    }

    .view-2b__main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      width: 100%;
    }

    .view-2b__body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      min-height: 0;
      overflow: hidden;
    }

    .view-2__heading {
      margin: 0 0 var(--space-md);
      flex-shrink: 0;
      width: var(--deck-grid-w);
      font-size: var(--text-md);
      font-weight: var(--weight-semibold);
      line-height: var(--leading-tight);
      text-align: center;
    }

    .view-2__stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
      flex-shrink: 0;
    }

    .deck-grid-panel {
      padding: var(--space-sm);
      border-radius: var(--radius-lg);
    }

    .deck-grid {
      display: grid;
      grid-template-columns: var(--buddy-card-deck-w) var(--buddy-card-deck-w);
      grid-template-rows: var(--buddy-card-deck-h) var(--buddy-card-deck-h);
      gap: var(--deck-grid-gap);
      width: var(--deck-grid-w);
      flex-shrink: 0;
    }

    .buddy-card--deck .deck-label {
      font-size: 11px;
      line-height: 1.2;
    }

    @keyframes deckPick {
      0% {
        transform: scale(1);
      }
      45% {
        transform: scale(1.05);
        box-shadow: var(--shadow-md);
      }
      100% {
        transform: scale(1);
      }
    }

    .buddy-card--picking {
      animation: deckPick 420ms var(--ease-out);
    }

    .buddy-card--selected {
      border-color: var(--color-text);
      background-color: var(--color-surface);
      box-shadow: var(--shadow-md);
    }

    .buddy-card--locked {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    .buddy-card--locked .buddy-card__deck-desc {

    .view-5__list {

    .log-entry__delete svg {

    .log-entry__select-mark {

      width: 18px;
      height: 18px;

    .view-5--compile-mode .log-entry--reflection .log-entry__select-mark {

    .log-entry--selected .log-entry__select-mark {

    .log-entry {

    .log-entry__meta {

      justify-content: space-between;

    .log-entry__date {

    .log-entry__deck {

    .log-entry__deck .deck-indicator {

    .log-entry__anchor {

      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--color-text);

    .log-entry__prompt-toggle {

      background: none;

    .log-entry__prompt {

    .view-tab {

    }

    .view-tab svg {

      width: 18px;
      height: 18px;

  <div id="view-5" class="view view-5 view--hidden">
    <div class="view-5__header">
      <nav class="view-nav view-5__nav" aria-label="Reflection log navigation">
        <button type="button" id="view-5-back" class="nav-round-btn nav-round-btn--secondary" aria-label="Back to saved screen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

    <div id="view-5-list" class="view-5__list" role="list"></div>

      <button type="button" id="view-5-compile-toggle" class="btn btn-secondary btn-full">Compile document</button>
      <button type="button" id="view-5-compile-confirm" class="btn btn-primary btn-full view-5__compile-confirm view-5__compile-confirm--hidden">Compile selected</button>

      <p class="text-muted">Document — Step 9</p>

  <script>
    const LOADING_DURATION = 1500;
    const MAX_REDRAWS = 2;
    const CARD_PROMPT_FONT_MAX = 28;
    const CARD_PROMPT_FONT_MIN = 8;
    const CARD_CONTEXT_FONT_MAX = 11;
    const CARD_CONTEXT_FONT_MIN = 7;
    const MAIN_DECKS = ['Inspiration', 'Connections', 'Interfacing'];

    const loadingScreen = document.getElementById('loading-screen');
    const view1 = document.getElementById('view-1');
    const view2 = document.getElementById('view-2');
    const view2b = document.getElementById('view-2b');
    const view3 = document.getElementById('view-3');
    const view4 = document.getElementById('view-4');
    const view5 = document.getElementById('view-5');
    const view6 = document.getElementById('view-6');
    const view4Log = document.getElementById('view-4-log');
    const view4Continue = document.getElementById('view-4-continue');
    const view5Back = document.getElementById('view-5-back');
    const view5Empty = document.getElementById('view-5-empty');
    const view5List = document.getElementById('view-5-list');
    const view5CompileToggle = document.getElementById('view-5-compile-toggle');
    const view5CompileConfirm = document.getElementById('view-5-compile-confirm');
    const view3Anchor = document.getElementById('view-3-anchor');
    const view3Earlier = document.getElementById('view-3-earlier');
    const view3EarlierText = document.getElementById('view-3-earlier-text');
    const view3DeckIndicator = document.getElementById('view-3-deck-indicator');
    const view3Prompt = document.getElementById('view-3-prompt');
    const view3ContextWrap = document.getElementById('view-3-context-wrap');
    const view3Context = document.getElementById('view-3-context');
    const view3Response = document.getElementById('view-3-response');
    const view3Save = document.getElementById('view-3-save');
    const view3TabFrame = document.getElementById('view-3-tab-frame');
    const view3TabCard = document.getElementById('view-3-tab-card');
    const view1Pick = document.getElementById('view-1-pick');
    const view1Selected = document.getElementById('view-1-selected');
    const framePreviewFallback = document.getElementById('frame-preview-fallback');
    const framePreviewImg = document.getElementById('frame-preview-img');
    const framePreviewIcon = document.getElementById('frame-preview-icon');
    const anchorNameInput = document.getElementById('anchor-name-input');
    const clearSelectionBtn = document.getElementById('clear-selection-btn');
    const view1Next = document.getElementById('view-1-next');
    const view2bBack = document.getElementById('view-2b-back');
    const view2bDeckIndicator = document.getElementById('view-2b-deck-indicator');
    const deckThreadBtn = document.getElementById('deck-thread');
    const surpriseBtn = document.getElementById('surprise-btn');
    const drawnPromptEl = document.getElementById('drawn-prompt');
    const drawnContextEl = document.getElementById('drawn-context');
    const contextFlipBtn = document.getElementById('context-flip-btn');
    const contextFlipBackBtn = document.getElementById('context-flip-back-btn');
    const drawnCard = document.getElementById('drawn-card');
    const redrawBtn = document.getElementById('redraw-btn');
    const surprise2bBtn = document.getElementById('surprise-2b-btn');
    const view2bNext = document.getElementById('view-2b-next');

    const DECK_INDICATORS = {
      Inspiration: '<span class="deck-indicator"><svg viewBox="0 0 12 12" aria-hidden="true"><polygon points="6,1 11,11 1,11" fill="#C8973A"/></svg></span>',
      Connections: '<span class="deck-indicator"><svg viewBox="0 0 12 12" aria-hidden="true"><polygon points="6,0.5 11,3.25 11,8.75 6,11.5 1,8.75 1,3.25" fill="#4A8C6F"/></svg></span>',
      Interfacing: '<span class="deck-indicator"><svg viewBox="0 0 12 12" aria-hidden="true"><rect x="1" y="1" width="10" height="10" fill="#4A7FA5"/></svg></span>',
      thread: '<span class="deck-indicator"><svg viewBox="0 0 12 12" aria-hidden="true"><circle cx="6" cy="6" r="4" fill="#C86E3A"/></svg></span>'
    };

    const DECK_LABELS = {
      Inspiration: 'Inspiration',
      Connections: 'Connections',
      Interfacing: 'Interfacing',
      thread: 'Thread'
    };

    const DECK_KEY_FROM_STORED = {
      inspiration: 'Inspiration',
      connections: 'Connections',
      interfacing: 'Interfacing',
      thread: 'thread'
    };

    let reflections = [];
    let documents = [];
    let compileMode = false;
    let compileSelectedIds = new Set();
    let preselectedDeck = null;
    let selection = null;
    let anchorTitle = '';
    let anchorCommitted = false;
    let prompts = null;
    let reflectionCount = 0;
    let selectedDeck = null;
    let activeDeck = null;
    let redrawCount = 0;
    let view2bLocked = false;
    let view2bPreviewMode = false;
    let view3ReturnMode = false;
    let pendingHelperText = null;
    let lastReflectionExcerpt = null;

    const appState = {
      anchor: null,
      anchorTitle: '',
      deck: null,
      prompt: null,
      helperText: null
    };

    function showView(el) {
      el.classList.remove('view--hidden');
    }

    function hideView(el) {
      el.classList.add('view--hidden');
    }

    function randomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function isThreadUnlocked() {
      return reflectionCount >= 3;
    }

    function updateThreadCard() {
      const unlocked = isThreadUnlocked();
      deckThreadBtn.disabled = !unlocked;
      deckThreadBtn.classList.toggle('buddy-card--locked', !unlocked);
      deckThreadBtn.querySelector('.buddy-card__deck-desc').textContent = unlocked
        ? 'Pick up where you left off'
        : 'Unlocks after 3 reflections';
    }

    function setReflectionCount(count) {
      reflectionCount = count;
      updateThreadCard();
    }

    function formatLogDate(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString(undefined, {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    }

    function firstSentence(text) {
      const match = String(text).match(/^[^.!?]+[.!?]?/);
      return match ? match[0].trim() : String(text).trim();
    }

    function updateReflectionDerivedState() {
      reflectionCount = reflections.length;
      updateThreadCard();
      if (reflections.length > 0) {
        lastReflectionExcerpt = firstSentence(reflections[0].response);
      } else {
        lastReflectionExcerpt = null;
      }
    }

    function setReflections(data) {
      reflections = Array.isArray(data) ? data.slice() : [];
      updateReflectionDerivedState();
    }

    function setDocuments(data) {
      documents = Array.isArray(data) ? data.slice() : [];
    }

    function setHistory(data, docs) {
      setReflections(data);
      setDocuments(docs);
    }

    function getExclusiveDeck() {
      const counts = { Inspiration: 0, Connections: 0, Interfacing: 0 };
      reflections.forEach((entry) => {
        const key = DECK_KEY_FROM_STORED[entry.deck] || 'Inspiration';
        if (key in counts) counts[key] += 1;
      });
      const min = Math.min(
        counts.Inspiration,
        counts.Connections,
        counts.Interfacing
      );
      const candidates = MAIN_DECKS.filter((deck) => counts[deck] === min);
      return randomItem(candidates);
    }

    function compileReflectionsMarkdown(entries) {
      const generated = new Date().toLocaleDateString(undefined, {
        month: 'long',
        day: 'numeric',
        year: 'numeric'
      });
      const byDeck = {
        Inspiration: [],
        Connections: [],
        Interfacing: [],
        thread: []
      };

      entries.forEach((entry) => {
        const key = DECK_KEY_FROM_STORED[entry.deck] || 'Inspiration';
        const bucket = key === 'thread' ? 'thread' : key;
        if (byDeck[bucket]) byDeck[bucket].push(entry);
      });

      let md =
        '# Design Buddy — Reflection Log\nGenerated: ' +
        generated +
        '\n\n---\n\n';

      ['Inspiration', 'Connections', 'Interfacing'].forEach((deckName) => {
        const deckEntries = byDeck[deckName];
        if (!deckEntries.length) return;
        md += '## ' + deckName + '\n\n';
        deckEntries.forEach((entry) => {
          const anchor =
            (entry.anchor && entry.anchor.value) || 'Untitled anchor';
          md +=
            '### ' +
            formatLogDate(entry.date) +
            ' — ' +
            anchor +
            '\n**Prompt:** ' +
            entry.prompt +
            '\n\n' +
            entry.response +
            '\n\n---\n\n';
        });
      });

      if (byDeck.thread.length) {
        md += '## Thread\n\n';
        byDeck.thread.forEach((entry) => {
          const anchor =
            (entry.anchor && entry.anchor.value) || 'Untitled anchor';
          md +=
            '### ' +
            formatLogDate(entry.date) +
            ' — ' +
            anchor +
            '\n**Prompt:** ' +
            entry.prompt +
            '\n\n' +
            entry.response +
            '\n\n---\n\n';
        });
      }

      return md.trim() + '\n';
    }

    function downloadMarkdown(markdown, filename) {
      const blob = new Blob([markdown], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function exitCompileMode() {
      compileMode = false;
      compileSelectedIds = new Set();
      view5.classList.remove('view-5--compile-mode');
      view5CompileConfirm.classList.add('view-5__compile-confirm--hidden');
      view5CompileToggle.textContent = 'Compile document';
    }

    function enterCompileMode() {
      if (reflections.length === 0) return;
      compileMode = true;
      compileSelectedIds = new Set();
      view5.classList.add('view-5--compile-mode');
      view5CompileConfirm.classList.remove('view-5__compile-confirm--hidden');
      view5CompileToggle.textContent = 'Cancel';
      renderLog();
    }

    function updateCompileConfirmState() {
      view5CompileConfirm.disabled = compileSelectedIds.size === 0;
    }

    function toggleCompileSelection(id) {
      if (!compileMode) return;
      if (compileSelectedIds.has(id)) {
        compileSelectedIds.delete(id);
      } else {
        compileSelectedIds.add(id);
      }
      updateCompileConfirmState();
      renderLog();
    }

    function persistCompiledDocument(markdown, reflectionIds) {
      const doc = {
        id:
          typeof crypto !== 'undefined' && crypto.randomUUID
            ? crypto.randomUUID()
            : String(Date.now()) + '-doc-' + Math.random().toString(36).slice(2, 8),
        date: new Date().toISOString().slice(0, 10),
        createdAt: new Date().toISOString(),
        reflectionIds: reflectionIds.slice(),
        reflectionCount: reflectionIds.length,
        markdown
      };
      parent.postMessage(
        {
          pluginMessage: {
            type: 'save-compiled-document',
            document: doc,
            reflectionIds
          }
        },
        '*'
      );
    }

    function deleteReflection(id) {
      parent.postMessage(
        { pluginMessage: { type: 'delete-reflection', id } },
        '*'
      );
    }

    function buildStartNewCard() {
      const deckKey = getExclusiveDeck();
      const deckLabel = DECK_LABELS[deckKey] || deckKey;
      const deckIcon = DECK_INDICATORS[deckKey] || '';
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'log-entry log-entry--start-new';
      btn.setAttribute('role', 'listitem');
      btn.innerHTML =
        '<div class="log-entry__meta">' +
          '<p class="log-entry__date">Suggested deck</p>' +
          '<p class="log-entry__deck">' + deckIcon + deckLabel + '</p>' +
        '</div>' +
        '<p class="log-entry__start-label">Start new reflection</p>' +
        '<p class="log-entry__start-desc">Least-used deck from your history — tap to draw a prompt.</p>';
      btn.addEventListener('click', startNewReflectionFromLog);
      return btn;
    }

    function buildReflectionLogEntry(entry) {
      const deckKey = DECK_KEY_FROM_STORED[entry.deck] || 'Inspiration';
      const deckLabel = DECK_LABELS[deckKey] || entry.deck;
      const deckIcon = DECK_INDICATORS[deckKey] || '';
      const anchorLabel =
        (entry.anchor && entry.anchor.value) || 'Untitled anchor';
      const selected = compileSelectedIds.has(entry.id);

      const article = document.createElement('article');
      article.className =
        'log-entry log-entry--reflection' +
        (selected ? ' log-entry--selected' : '');
      article.setAttribute('role', 'listitem');
      article.dataset.reflectionId = entry.id;

      article.innerHTML =
        '<div class="log-entry__meta">' +
          '<span class="log-entry__select-mark" aria-hidden="true"></span>' +
          '<p class="log-entry__date">' + formatLogDate(entry.date) + '</p>' +
          '<p class="log-entry__deck">' + deckIcon + deckLabel + '</p>' +
          '<button type="button" class="log-entry__delete" aria-label="Delete reflection">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">' +
              '<path d="M18 6L6 18M6 6l12 12"/>' +
            '</svg>' +
          '</button>' +
        '</div>' +
        '<p class="log-entry__anchor"></p>' +
        '<button type="button" class="log-entry__prompt-toggle" aria-expanded="false">Show prompt</button>' +
        '<p class="log-entry__prompt"></p>' +
        '<p class="log-entry__response"></p>';

      article.querySelector('.log-entry__anchor').textContent = anchorLabel;
      article.querySelector('.log-entry__prompt').textContent = entry.prompt;
      article.querySelector('.log-entry__response').textContent = entry.response;

      if (compileMode) {
        article.addEventListener('click', (event) => {
          if (event.target.closest('.log-entry__delete')) return;
          if (event.target.closest('.log-entry__prompt-toggle')) return;
          toggleCompileSelection(entry.id);
        });
      }

      article
        .querySelector('.log-entry__delete')
        .addEventListener('click', (event) => {
          event.stopPropagation();
          deleteReflection(entry.id);
        });

      return article;
    }

    function buildDocumentLogEntry(doc) {
      const article = document.createElement('article');
      article.className = 'log-entry log-entry--document';
      article.setAttribute('role', 'listitem');
      article.dataset.documentId = doc.id;

      const countLabel =
        (doc.reflectionCount || (doc.reflectionIds && doc.reflectionIds.length) || 0) +
        ' reflection' +
        ((doc.reflectionCount || 0) === 1 ? '' : 's');

      article.innerHTML =
        '<div class="log-entry__meta">' +
          '<p class="log-entry__date">' + formatLogDate(doc.date) + '</p>' +
          '<p class="log-entry__deck">Document</p>' +
        '</div>' +
        '<p class="log-entry__anchor">Compiled ' + countLabel + '</p>' +
        '<button type="button" class="log-entry__prompt-toggle" aria-expanded="false">Preview document</button>' +
        '<p class="log-entry__doc-preview"></p>' +
        '<div class="log-entry__doc-actions">' +
          '<button type="button" class="btn btn-secondary log-entry__doc-download">Download .md</button>' +
        '</div>';

      const preview = article.querySelector('.log-entry__doc-preview');
      preview.textContent = doc.markdown || '';

      const filename =
        'design-buddy-reflections-' + doc.date + '.md';
      article
        .querySelector('.log-entry__doc-download')
        .addEventListener('click', () => {
          downloadMarkdown(doc.markdown || '', filename);
        });

      return article;
    }

    function getHistoryTimeline() {
      const items = [];
      reflections.forEach((entry, index) => {
        const rank = String(reflections.length - index).padStart(6, '0');
        items.push({
          kind: 'reflection',
          sortKey: (entry.date || '') + '-r' + rank,
          entry
        });
      });
      documents.forEach((doc, index) => {
        const rank = String(documents.length - index).padStart(6, '0');
        const timeKey = doc.createdAt || doc.date + 'T12:00:00';
        items.push({
          kind: 'document',
          sortKey: timeKey + '-d' + rank,
          entry: doc
        });
      });
      items.sort((a, b) => b.sortKey.localeCompare(a.sortKey));
      return items;
    }

    function startNewReflectionFromLog() {
      if (compileMode) return;
      preselectedDeck = getExclusiveDeck();
      appState.response = '';
      view3Response.value = '';
      hideView(view5);
      showView(view1);
    }

    function continueReflectingFromSaved() {
      appState.response = '';
      view3Response.value = '';
      hideView(view4);
      showView(view3);
      renderView3();
    }

    function requestReflectionsFromPlugin() {
      parent.postMessage({ pluginMessage: { type: 'get-reflections' } }, '*');
    }

    function buildReflectionEntry() {
      const anchorValue =
        (appState.anchor && appState.anchor.value) ||
        appState.anchorTitle ||
        '';
      return {
        id:
          typeof crypto !== 'undefined' && crypto.randomUUID
            ? crypto.randomUUID()
            : String(Date.now()) + '-' + Math.random().toString(36).slice(2, 8),
        date: new Date().toISOString().slice(0, 10),
        anchor: appState.anchor
          ? {
              type: appState.anchor.type || 'frame',
              value: anchorValue
            }
          : { type: 'text', value: anchorValue },
        deck: appState.deck || 'inspiration',
        prompt: appState.prompt || '',
        response: appState.response || '',
        helperText: appState.helperText || null
      };
    }

    function renderLog() {
      view5List.innerHTML = '';
      view5List.appendChild(buildStartNewCard());

      const hasHistory = reflections.length > 0 || documents.length > 0;
      if (!hasHistory) {
        view5Empty.classList.remove('view-5__empty--hidden');
      } else {
        view5Empty.classList.add('view-5__empty--hidden');
      }

      getHistoryTimeline().forEach((item) => {
        if (item.kind === 'reflection') {
          view5List.appendChild(buildReflectionLogEntry(item.entry));
        } else {
          view5List.appendChild(buildDocumentLogEntry(item.entry));
        }
      });

      updateCompileConfirmState();
    }

    function openView5Log() {
      exitCompileMode();
      renderLog();
      hideView(view4);
      showView(view5);
    }

    function clearDeckSelection() {
      selectedDeck = null;
      document.querySelectorAll('.buddy-card--deck[data-deck]').forEach((btn) => {
        btn.classList.remove('buddy-card--selected');
      });
    }

    function playDeckPickAnimation(deckKey) {
      const btn = document.querySelector('.buddy-card--deck[data-deck="' + deckKey + '"]');
      if (!btn) return;
      btn.classList.remove('buddy-card--picking');
      void btn.offsetWidth;
      btn.classList.add('buddy-card--picking');
      btn.addEventListener('animationend', () => {
        btn.classList.remove('buddy-card--picking');
      }, { once: true });
    }

    function selectDeck(deckKey) {
      if (deckKey === 'thread' && !isThreadUnlocked()) return;
      selectedDeck = deckKey;
      document.querySelectorAll('.buddy-card--deck[data-deck]').forEach((btn) => {
        btn.classList.toggle('buddy-card--selected', btn.dataset.deck === deckKey);
      });
      playDeckPickAnimation(deckKey);
      goToView2b();
    }

    function surpriseMe() {
      const pool = isThreadUnlocked()
        ? MAIN_DECKS.concat(['thread'])
        : MAIN_DECKS.slice();
      selectDeck(randomItem(pool));
    }

    function goBackToView2() {
      if (view2bLocked) return;
      hideView(view2b);
      showView(view2);
      clearDeckSelection();
      activeDeck = null;
    }

    function updateDeckIndicator(deckKey) {
      const label = DECK_LABELS[deckKey] || deckKey;
      const icon = DECK_INDICATORS[deckKey] || '';
      view2bDeckIndicator.innerHTML =
        icon + '<span class="buddy-card__badge-label">' + label + '</span>';
    }

    function updateContextDisplay(wrapEl, textEl, text) {
      const value = text && String(text).trim();
      if (value) {
        wrapEl.classList.remove('context-box--hidden');
        textEl.textContent = value;
      } else {
        wrapEl.classList.add('context-box--hidden');
        textEl.textContent = '';
      }
    }

    function setCardFlipped(flipped) {
      drawnCard.classList.toggle('card-flip--flipped', flipped);
      scheduleCardTextFit();
    }

    function fitTextInContainer(textEl, containerEl, maxPx, minPx, lineHeight) {
      if (!textEl || !containerEl) return;
      if (!textEl.textContent.trim()) return;

      const lh = lineHeight || 1.15;
      textEl.style.lineHeight = String(lh);
      let size = maxPx;
      textEl.style.fontSize = size + 'px';

      const maxHeight = containerEl.clientHeight;
      if (maxHeight <= 0) return;

      while (size > minPx && textEl.scrollHeight > maxHeight + 1) {
        size -= 1;
        textEl.style.fontSize = size + 'px';
      }
    }

    function scheduleCardTextFit() {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const promptWrap = drawnPromptEl.parentElement;
          const contextWrap = drawnContextEl.parentElement;
          fitTextInContainer(
            drawnPromptEl,
            promptWrap,
            CARD_PROMPT_FONT_MAX,
            CARD_PROMPT_FONT_MIN,
            1.12
          );
          if (drawnContextEl.textContent.trim()) {
            fitTextInContainer(
              drawnContextEl,
              contextWrap,
              CARD_CONTEXT_FONT_MAX,
              CARD_CONTEXT_FONT_MIN,
              1.2
            );
          }
        });
      });
    }

    function updateCardContextUI() {
      const value = appState.helperText && String(appState.helperText).trim();
      if (value) {
        drawnContextEl.textContent = value;
        contextFlipBtn.classList.remove('card-flip__context-btn--hidden');
      } else {
        drawnContextEl.textContent = '';
        contextFlipBtn.classList.add('card-flip__context-btn--hidden');
        setCardFlipped(false);
      }
      scheduleCardTextFit();
    }

    function renderView3DeckIndicator() {
      const deckKey = deckKeyFromAppState();
      if (!deckKey) {
        view3DeckIndicator.classList.add('view-3__deck-indicator--hidden');
        view3DeckIndicator.innerHTML = '';
        return;
      }
      const label = DECK_LABELS[deckKey] || deckKey;
      const icon = DECK_INDICATORS[deckKey] || '';
      view3DeckIndicator.innerHTML =
        icon + '<span class="buddy-card__badge-label">' + label + '</span>';
      view3DeckIndicator.classList.remove('view-3__deck-indicator--hidden');
    }

    function deckKeyFromAppState() {
      if (appState.deck === 'thread') return 'thread';
      if (!appState.deck) return activeDeck;
      return appState.deck.charAt(0).toUpperCase() + appState.deck.slice(1);
    }

    function renderView2bFromState() {
      const deckKey = deckKeyFromAppState() || activeDeck;
      if (deckKey) updateDeckIndicator(deckKey);
      drawnPromptEl.textContent = appState.prompt || '';
      updateCardContextUI();
      scheduleCardTextFit();
    }

    function updateView2bControls() {
      if (view2bPreviewMode) {
        redrawBtn.classList.add('view-2b__redraw--hidden');
        surprise2bBtn.classList.add('view-2b__redraw--hidden');
        view2bBack.classList.add('view-2b__redraw--hidden');
        return;
      }

      const hideRedraw = view2bLocked || redrawCount >= MAX_REDRAWS;
      const hideSurpriseAndBack = view2bLocked;

      redrawBtn.classList.toggle('view-2b__redraw--hidden', hideRedraw);
      surprise2bBtn.classList.toggle('view-2b__redraw--hidden', hideSurpriseAndBack);
      view2bBack.classList.toggle('view-2b__redraw--hidden', hideSurpriseAndBack);
    }

    function openView1FromView3() {
      view3ReturnMode = true;
      hideView(view3);
      showView(view1);
      if (anchorCommitted) {
        showSelectedState();
      } else {
        showPickState();
      }
      view1Next.disabled = false;
    }

    function openView2bPreviewFromView3() {
      view2bPreviewMode = true;
      view2b.classList.add('view-2b--preview');
      hideView(view3);
      showView(view2b);
      updateView2bControls();
      renderView2bFromState();
    }

    function exitView2bPreview() {
      view2bPreviewMode = false;
      view2b.classList.remove('view-2b--preview');
      hideView(view2b);
      showView(view3);
      renderView3();
    }

    function playCardAnimation() {
      drawnCard.classList.remove('buddy-card--animate');
      drawnCard.classList.add('buddy-card--hidden');
      requestAnimationFrame(() => {
        void drawnCard.offsetWidth;
        drawnCard.classList.remove('buddy-card--hidden');
        drawnCard.classList.add('buddy-card--animate');
        scheduleCardTextFit();
      });
    }

    function requestPromptsFromPlugin() {
      parent.postMessage({ pluginMessage: { type: 'get-prompts' } }, '*');
    }

    function waitForPrompts(timeoutMs) {
      if (prompts) return Promise.resolve(true);
      return new Promise((resolve) => {
        const deadline = Date.now() + timeoutMs;
        const check = () => {
          if (prompts) {
            resolve(true);
            return;
          }
          if (Date.now() >= deadline) {
            resolve(false);
            return;
          }
          setTimeout(check, 40);
        };
        check();
      });
    }

    async function ensurePrompts() {
      if (prompts) return true;
      requestPromptsFromPlugin();
      return waitForPrompts(2500);
    }

    function drawPrompt() {
      if (!activeDeck) return;

      if (!prompts) {
        drawnPromptEl.textContent = 'Unable to load prompts. Reload the plugin.';
        appState.helperText = null;
        updateCardContextUI();
        updateDeckIndicator(activeDeck);
        playCardAnimation();
        return;
      }

      let question = '';
      pendingHelperText = null;

      if (activeDeck === 'thread') {
        question = randomItem(prompts.thread);
      } else {
        const entry = randomItem(prompts[activeDeck]);
        question = entry.question;
        pendingHelperText = entry.helper_text;
      }

      appState.helperText = pendingHelperText;
      updateDeckIndicator(activeDeck);
      drawnPromptEl.textContent = question;
      setCardFlipped(false);
      updateCardContextUI();
      playCardAnimation();
      updateView2bControls();
    }

    async function goToView2b() {
      if (!selectedDeck) return;
      activeDeck = selectedDeck;
      redrawCount = 0;
      view2bLocked = false;
      view2bPreviewMode = false;
      view2b.classList.remove('view-2b--preview');
      setCardFlipped(false);
      updateView2bControls();
      drawnCard.classList.add('buddy-card--hidden');
      drawnPromptEl.textContent = '';
      hideView(view2);
      showView(view2b);
      const loaded = await ensurePrompts();
      if (!loaded) {
        drawnPromptEl.textContent = 'Unable to load prompts. Reload the plugin.';
        updateDeckIndicator(activeDeck);
        playCardAnimation();
        return;
      }
      drawPrompt();
    }

    function surpriseMe2b() {
      if (view2bLocked) return;
      const pool = isThreadUnlocked()
        ? MAIN_DECKS.concat(['thread'])
        : MAIN_DECKS.slice();
      activeDeck = randomItem(pool);
      view2bLocked = true;
      drawPrompt();
    }

    function initView2() {
      clearDeckSelection();
      activeDeck = null;
      redrawCount = 0;
      view2bLocked = false;
      hideView(view2b);
      updateThreadCard();
    }

    function updateView3SaveState() {
      view3Save.disabled = !view3Response.value.trim();
    }

    function renderView3() {
      const anchorLabel =
        appState.anchorTitle ||
        (appState.anchor && appState.anchor.value) ||
        '';
      view3Anchor.textContent = anchorLabel;
      renderView3DeckIndicator();
      view3Prompt.textContent = appState.prompt || '';
      updateContextDisplay(view3ContextWrap, view3Context, appState.helperText);

      if (lastReflectionExcerpt) {
        view3Earlier.classList.remove('view-3__earlier--hidden');
        view3EarlierText.textContent = lastReflectionExcerpt;
      } else {
        view3Earlier.classList.add('view-3__earlier--hidden');
      }

      view3Response.value = appState.response || '';
      updateView3SaveState();
    }

    function saveReflection() {
      const response = view3Response.value.trim();
      if (!response) return;
      appState.response = response;
      parent.postMessage(
        { pluginMessage: { type: 'save-reflection', data: buildReflectionEntry() } },
        '*'
      );
      hideView(view3);
      showView(view4);
    }

    function closePlugin() {
      parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
    }

    function updateNavState() {
      view1Next.disabled = !anchorCommitted;
    }

    function showPickState() {
      view1Pick.classList.remove('view-1__pick--hidden');
      view1Selected.classList.add('view-1__selected--hidden');
      updateNavState();
    }

    function showSelectedState() {
      view1Pick.classList.add('view-1__pick--hidden');
      view1Selected.classList.remove('view-1__selected--hidden');
      updateNavState();
    }

    function applySelection(data) {
      selection = { name: data.name, type: data.type, image: data.image };
      anchorTitle = data.name;
      anchorCommitted = true;
      anchorNameInput.value = data.name;

      if (data.image) {
        framePreviewImg.src = 'data:image/png;base64,' + data.image;
        framePreviewImg.hidden = false;
        framePreviewIcon.hidden = true;
        framePreviewFallback.classList.add('frame-preview__name--hidden');
      } else {
        framePreviewImg.hidden = true;
        framePreviewImg.removeAttribute('src');
        framePreviewIcon.hidden = false;
        framePreviewFallback.textContent = data.name;
        framePreviewFallback.classList.remove('frame-preview__name--hidden');
      }

      showSelectedState();
    }

    function clearSelection() {
      selection = null;
      anchorTitle = '';
      anchorCommitted = false;
      anchorNameInput.value = '';
      framePreviewImg.hidden = true;
      framePreviewImg.removeAttribute('src');
      framePreviewIcon.hidden = false;
      framePreviewFallback.textContent = '';
      framePreviewFallback.classList.add('frame-preview__name--hidden');
      showPickState();
    }

    requestPromptsFromPlugin();
    requestReflectionsFromPlugin();

    setTimeout(() => {
      loadingScreen.classList.add('loading-screen--done');
      showView(view1);
      setTimeout(() => {
        loadingScreen.remove();
      }, 400);
    }, LOADING_DURATION);

    anchorNameInput.addEventListener('input', () => {
      anchorTitle = anchorNameInput.value;
    });

    clearSelectionBtn.addEventListener('click', clearSelection);

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'prompts-loaded' && msg.data) {
        prompts = msg.data;
        return;
      }

      if (msg.type === 'reflections-loaded') {
        setHistory(msg.data, msg.documents);
        if (!view5.classList.contains('view--hidden')) {
          renderLog();
        }
        return;
      }

      if (msg.type === 'save-success') {
        return;
      }

      if (msg.type === 'selection-cleared') {
        if (anchorCommitted) return;
        clearSelection();
        return;
      }

      if (msg.type === 'selection' && msg.data) {
        applySelection(msg.data);
      }
    };

    view1Next.addEventListener('click', () => {
      if (view3ReturnMode) {
        view3ReturnMode = false;
        const anchorValue = anchorTitle.trim() || (selection ? selection.name : '');
        if (anchorValue) {
          appState.anchorTitle = anchorValue;
          if (appState.anchor) {
            appState.anchor.value = anchorValue;
            if (selection) {
              appState.anchor.figmaName = selection.name;
              appState.anchor.figmaType = selection.type;
            }
          }
        }
        hideView(view1);
        showView(view3);
        renderView3();
        updateNavState();
        return;
      }

      if (!anchorCommitted) return;
      const anchorValue = anchorTitle.trim() || (selection ? selection.name : '');
      if (!anchorValue) return;
      appState.anchor = {
        type: 'frame',
        value: anchorValue,
        figmaName: selection ? selection.name : anchorValue,
        figmaType: selection ? selection.type : null
      };
      appState.anchorTitle = anchorValue;
      hideView(view1);

      if (preselectedDeck) {
        selectedDeck = preselectedDeck;
        preselectedDeck = null;
        initView2();
        goToView2b();
        return;
      }

      initView2();
      showView(view2);
    });

    document.querySelectorAll('.buddy-card--deck[data-deck]').forEach((btn) => {
      btn.addEventListener('click', () => selectDeck(btn.dataset.deck));
    });

    surpriseBtn.addEventListener('click', surpriseMe);

    view2bBack.addEventListener('click', goBackToView2);

    redrawBtn.addEventListener('click', () => {
      if (view2bLocked || redrawCount >= MAX_REDRAWS || !activeDeck) return;
      redrawCount += 1;
      drawPrompt();
    });

    surprise2bBtn.addEventListener('click', surpriseMe2b);

    view2bNext.addEventListener('click', () => {
      if (view2bPreviewMode) {
        exitView2bPreview();
        return;
      }
      if (!activeDeck) return;
      appState.deck = activeDeck === 'thread' ? 'thread' : activeDeck.toLowerCase();
      appState.prompt = drawnPromptEl.textContent;
      appState.helperText = pendingHelperText;
      hideView(view2b);
      showView(view3);
      renderView3();
    });

    contextFlipBtn.addEventListener('click', () => setCardFlipped(true));
    contextFlipBackBtn.addEventListener('click', () => setCardFlipped(false));

    view3TabFrame.addEventListener('click', openView1FromView3);
    view3TabCard.addEventListener('click', openView2bPreviewFromView3);

    view3Response.addEventListener('input', updateView3SaveState);
    view3Save.addEventListener('click', saveReflection);

    view4Log.addEventListener('click', openView5Log);
    view4Continue.addEventListener('click', continueReflectingFromSaved);

    view5Back.addEventListener('click', () => {
      exitCompileMode();
      hideView(view5);
      showView(view4);
    });

    view5CompileToggle.addEventListener('click', () => {
      if (compileMode) {
        exitCompileMode();
        renderLog();
        return;
      }
      enterCompileMode();
    });

    view5CompileConfirm.addEventListener('click', () => {
      if (!compileMode || compileSelectedIds.size === 0) return;
      const selected = reflections.filter((r) => compileSelectedIds.has(r.id));
      const markdown = compileReflectionsMarkdown(selected);
      const ids = selected.map((r) => r.id);
      persistCompiledDocument(markdown, ids);
      exitCompileMode();
    });

    view5List.addEventListener('click', (event) => {
      const toggle = event.target.closest('.log-entry__prompt-toggle');
      if (!toggle) return;
      const entry = toggle.closest('.log-entry');
      if (!entry) return;

      if (entry.classList.contains('log-entry--document')) {
        const previewEl = entry.querySelector('.log-entry__doc-preview');
        const expanded = previewEl.classList.toggle('log-entry__doc-preview--visible');
        toggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        toggle.textContent = expanded ? 'Hide preview' : 'Preview document';
        return;
      }

      const promptEl = entry.querySelector('.log-entry__prompt');
      const expanded = promptEl.classList.toggle('log-entry__prompt--visible');
      toggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
      toggle.textContent = expanded ? 'Hide prompt' : 'Show prompt';
    });

  </script>
</body>
</html>
