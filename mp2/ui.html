<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Font families */
      --font-ui: 'Figtree', sans-serif;
      --font-prompt: 'Amatic SC', cursive;

      /* Color — notebook B&W */
      --color-bg: #FAFAF8;
      --color-surface: #FFFFFF;
      --color-text: #1A1A1A;
      --color-text-muted: #6B6B6B;
      --color-text-subtle: #9A9A9A;
      --color-border: #E0E0DC;
      --color-border-strong: #C8C8C4;
      --color-btn-primary-bg: #1A1A1A;
      --color-btn-primary-text: #FAFAF8;
      --color-btn-secondary-bg: transparent;
      --color-btn-secondary-text: #1A1A1A;
      --color-btn-disabled-bg: #E8E8E4;
      --color-btn-disabled-text: #9A9A9A;

      /* Deck indicator colors */
      --deck-inspiration: #C8973A;
      --deck-connections: #4A8C6F;
      --deck-interfacing: #4A7FA5;
      --deck-thread: #C86E3A;
      --deck-indicator-size: 11px;

      /* Spacing */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 24px;
      --space-2xl: 32px;

      /* Typography scale */
      --text-xs: 10px;
      --text-sm: 12px;
      --text-base: 14px;
      --text-md: 16px;
      --text-lg: 20px;
      --text-xl: 24px;
      --text-2xl: 28px;

      --weight-regular: 400;
      --weight-medium: 500;
      --weight-semibold: 600;

      --leading-tight: 1.2;
      --leading-normal: 1.5;
      --leading-relaxed: 1.65;

      /* Radii */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(26, 26, 26, 0.06);
      --shadow-md: 0 2px 8px rgba(26, 26, 26, 0.08);
      --shadow-card: 0 1px 3px rgba(26, 26, 26, 0.06), 0 4px 12px rgba(26, 26, 26, 0.04);

      /* Motion */
      --duration-fast: 150ms;
      --duration-normal: 250ms;
      --duration-slow: 400ms;
      --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-in-out: cubic-bezier(0.42, 0, 0.58, 1);
      --reveal-distance: 8px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: var(--weight-regular);
      line-height: var(--leading-normal);
      color: var(--color-text);
      background-color: var(--color-bg);
      -webkit-font-smoothing: antialiased;
    }

    .text-title {
      font-family: var(--font-ui);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      line-height: var(--leading-tight);
      color: var(--color-text);
    }

    .text-body {
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: var(--weight-regular);
      line-height: var(--leading-normal);
      color: var(--color-text);
    }

    .text-prompt {
      font-family: var(--font-prompt);
      font-size: var(--text-2xl);
      font-weight: 700;
      line-height: var(--leading-tight);
      color: var(--color-text);
    }

    .text-muted {
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: var(--weight-regular);
      line-height: var(--leading-normal);
      color: var(--color-text-muted);
    }

    .text-label {
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      line-height: var(--leading-normal);
      color: var(--color-text);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      line-height: var(--leading-normal);
      padding: var(--space-sm) var(--space-lg);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background-color var(--duration-fast) var(--ease-out),
                  color var(--duration-fast) var(--ease-out),
                  opacity var(--duration-fast) var(--ease-out);
    }

    .btn-primary {
      background-color: var(--color-btn-primary-bg);
      color: var(--color-btn-primary-text);
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.85;
    }

    .btn-secondary {
      background-color: var(--color-btn-secondary-bg);
      color: var(--color-btn-secondary-text);
      border: 1px solid var(--color-border-strong);
    }

    .btn-secondary:hover:not(:disabled) {
      background-color: var(--color-surface);
    }

    .btn:disabled {
      background-color: var(--color-btn-disabled-bg);
      color: var(--color-btn-disabled-text);
      border-color: transparent;
      cursor: not-allowed;
      opacity: 1;
    }

    .textarea-reflection {
      display: block;
      width: 100%;
      min-height: 120px;
      padding: var(--space-md) 0;
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: var(--weight-regular);
      line-height: var(--leading-relaxed);
      color: var(--color-text);
      background-color: transparent;
      border: none;
      border-bottom: 1px solid var(--color-border);
      border-radius: 0;
      resize: none;
      outline: none;
    }

    .textarea-reflection::placeholder {
      color: var(--color-text-subtle);
    }

    .textarea-reflection:focus {
      border-bottom-color: var(--color-border-strong);
    }

    .card {
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: var(--space-lg);
    }

    .card-deck {
      padding: var(--space-md);
      cursor: pointer;
      transition: box-shadow var(--duration-normal) var(--ease-out),
                  border-color var(--duration-normal) var(--ease-out);
    }

    .card-deck:hover {
      border-color: var(--color-border-strong);
      box-shadow: var(--shadow-md);
    }

    .card-prompt {
      padding: var(--space-xl);
    }

    .deck-label {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .deck-indicator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--deck-indicator-size);
      height: var(--deck-indicator-size);
      flex-shrink: 0;
    }

    .deck-indicator svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .transition-base {
      transition: opacity var(--duration-normal) var(--ease-out),
                  transform var(--duration-normal) var(--ease-out);
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(var(--reveal-distance));
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reveal {
      animation: reveal var(--duration-slow) var(--ease-out) both;
    }

    /* Temporary — removed when View 1 is built */
    .smoke-test {
      padding: var(--space-md);
      height: 100%;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .smoke-test .textarea-reflection {
      min-height: 48px;
    }

    .smoke-test__row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      align-items: center;
    }

    .smoke-test__decks {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }
  </style>
</head>
<body>
  <!-- Temporary smoke test — remove when View 1 is built -->
  <div class="smoke-test">
    <p class="text-muted">Design system smoke test</p>

    <h1 class="text-title">Design Buddy</h1>
    <p class="text-body">What were you working on today?</p>
    <p class="text-muted">Muted supporting text</p>

    <div class="smoke-test__decks">
      <span class="deck-label text-label">
        <span class="deck-indicator">
          <svg viewBox="0 0 12 12" aria-hidden="true"><polygon points="6,1 11,11 1,11" fill="#C8973A"/></svg>
        </span>
        Inspiration
      </span>
      <span class="deck-label text-label">
        <span class="deck-indicator">
          <svg viewBox="0 0 12 12" aria-hidden="true"><polygon points="6,0.5 11,3.25 11,8.75 6,11.5 1,8.75 1,3.25" fill="#4A8C6F"/></svg>
        </span>
        Connections
      </span>
      <span class="deck-label text-label">
        <span class="deck-indicator">
          <svg viewBox="0 0 12 12" aria-hidden="true"><rect x="1" y="1" width="10" height="10" fill="#4A7FA5"/></svg>
        </span>
        Interfacing
      </span>
      <span class="deck-label text-label">
        <span class="deck-indicator">
          <svg viewBox="0 0 12 12" aria-hidden="true"><circle cx="6" cy="6" r="4" fill="#C86E3A"/></svg>
        </span>
        Thread
      </span>
    </div>

    <div class="card card-deck">
      <span class="deck-label text-label">
        <span class="deck-indicator">
          <svg viewBox="0 0 12 12" aria-hidden="true"><polygon points="6,1 11,11 1,11" fill="#C8973A"/></svg>
        </span>
        Inspiration
      </span>
      <p class="text-muted" style="margin:4px 0 0">Explore ideas and references</p>
    </div>

    <div class="card card-prompt reveal">
      <p class="text-prompt">Where did you use a familiar metaphor today?</p>
    </div>

    <textarea class="textarea-reflection" placeholder="Write your reflection…"></textarea>

    <div class="smoke-test__row">
      <button type="button" class="btn btn-primary">Continue</button>
      <button type="button" class="btn btn-secondary">See all</button>
      <button type="button" class="btn btn-primary" disabled>Disabled</button>
    </div>
  </div>
</body>
</html>
