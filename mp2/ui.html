<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Font families */
      --font-ui: 'Figtree', sans-serif;
      --font-prompt: 'Amatic SC', cursive;

      /* Color — notebook B&W */
      --color-bg: #FAFAF8;
      --color-surface: #FFFFFF;
      --color-text: #1A1A1A;
      --color-text-muted: #6B6B6B;
      --color-text-subtle: #9A9A9A;
      --color-border: #E0E0DC;
      --color-border-strong: #C8C8C4;
      --color-btn-primary-bg: #1A1A1A;
      --color-btn-primary-text: #FAFAF8;
      --color-btn-secondary-bg: transparent;
      --color-btn-secondary-text: #1A1A1A;
      --color-btn-disabled-bg: #E8E8E4;
      --color-btn-disabled-text: #9A9A9A;

      /* Deck indicator colors */
      --deck-inspiration: #C8973A;
      --deck-connections: #4A8C6F;
      --deck-interfacing: #4A7FA5;
      --deck-thread: #C86E3A;
      --deck-indicator-size: 11px;

      /* Spacing */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 24px;
      --space-2xl: 32px;

      /* Typography scale */
      --text-xs: 10px;
      --text-sm: 12px;
      --text-base: 14px;
      --text-md: 16px;
      --text-lg: 20px;
      --text-xl: 24px;
      --text-2xl: 28px;

      --weight-regular: 400;
      --weight-medium: 500;
      --weight-semibold: 600;

      --leading-tight: 1.2;
      --leading-normal: 1.5;
      --leading-relaxed: 1.65;

      /* Radii */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(26, 26, 26, 0.06);
      --shadow-md: 0 2px 8px rgba(26, 26, 26, 0.08);
      --shadow-card: 0 1px 3px rgba(26, 26, 26, 0.06), 0 4px 12px rgba(26, 26, 26, 0.04);

      /* Motion */
      --duration-fast: 150ms;
      --duration-normal: 250ms;
      --duration-slow: 400ms;
      --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-in-out: cubic-bezier(0.42, 0, 0.58, 1);
    }
  </style>
</head>
<body>
</body>
</html>
