<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Font families */
      --font-ui: 'Figtree', sans-serif;
      --font-prompt: 'Amatic SC', cursive;

      /* Color — notebook B&W */
      --color-bg: #FAFAF8;
      --color-surface: #FFFFFF;
      --color-text: #1A1A1A;
      --color-text-muted: #6B6B6B;
      --color-text-subtle: #9A9A9A;
      --color-border: #E0E0DC;
      --color-border-strong: #C8C8C4;
      --color-btn-primary-bg: #1A1A1A;
      --color-btn-primary-text: #FAFAF8;
      --color-btn-secondary-bg: transparent;
      --color-btn-secondary-text: #1A1A1A;
      --color-btn-disabled-bg: #E8E8E4;
      --color-btn-disabled-text: #9A9A9A;

      /* Deck indicator colors */
      --deck-inspiration: #C8973A;
      --deck-connections: #4A8C6F;
      --deck-interfacing: #4A7FA5;
      --deck-thread: #C86E3A;
      --deck-indicator-size: 11px;

      /* Spacing */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 24px;
      --space-2xl: 32px;

      /* Typography scale */
      --text-xs: 10px;
      --text-sm: 12px;
      --text-base: 14px;
      --text-md: 16px;
      --text-lg: 20px;
      --text-xl: 24px;
      --text-2xl: 28px;

      --weight-regular: 400;
      --weight-medium: 500;
      --weight-semibold: 600;

      --leading-tight: 1.2;
      --leading-normal: 1.5;
      --leading-relaxed: 1.65;

      /* Radii */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(26, 26, 26, 0.06);
      --shadow-md: 0 2px 8px rgba(26, 26, 26, 0.08);
      --shadow-card: 0 1px 3px rgba(26, 26, 26, 0.06), 0 4px 12px rgba(26, 26, 26, 0.04);

      /* Motion */
      --duration-fast: 150ms;
      --duration-normal: 250ms;
      --duration-slow: 400ms;
      --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-in-out: cubic-bezier(0.42, 0, 0.58, 1);
      --reveal-distance: 8px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: var(--weight-regular);
      line-height: var(--leading-normal);
      color: var(--color-text);
      background-color: var(--color-bg);
      -webkit-font-smoothing: antialiased;
    }

    .text-title {
      font-family: var(--font-ui);
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      line-height: var(--leading-tight);
      color: var(--color-text);
    }

    .text-body {
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: var(--weight-regular);
      line-height: var(--leading-normal);
      color: var(--color-text);
    }

    .text-prompt {
      font-family: var(--font-prompt);
      font-size: var(--text-2xl);
      font-weight: 700;
      line-height: var(--leading-tight);
      color: var(--color-text);
    }

    .text-muted {
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: var(--weight-regular);
      line-height: var(--leading-normal);
      color: var(--color-text-muted);
    }

    .text-label {
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      line-height: var(--leading-normal);
      color: var(--color-text);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      line-height: var(--leading-normal);
      padding: var(--space-sm) var(--space-lg);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background-color var(--duration-fast) var(--ease-out),
                  color var(--duration-fast) var(--ease-out),
                  opacity var(--duration-fast) var(--ease-out);
    }

    .btn-primary {
      background-color: var(--color-btn-primary-bg);
      color: var(--color-btn-primary-text);
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.85;
    }

    .btn-secondary {
      background-color: var(--color-btn-secondary-bg);
      color: var(--color-btn-secondary-text);
      border: 1px solid var(--color-border-strong);
    }

    .btn-secondary:hover:not(:disabled) {
      background-color: var(--color-surface);
    }

    .btn:disabled {
      background-color: var(--color-btn-disabled-bg);
      color: var(--color-btn-disabled-text);
      border-color: transparent;
      cursor: not-allowed;
      opacity: 1;
    }

    .textarea-reflection {
      display: block;
      width: 100%;
      min-height: 120px;
      padding: var(--space-md) 0;
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: var(--weight-regular);
      line-height: var(--leading-relaxed);
      color: var(--color-text);
      background-color: transparent;
      border: none;
      border-bottom: 1px solid var(--color-border);
      border-radius: 0;
      resize: none;
      outline: none;
    }

    .textarea-reflection::placeholder {
      color: var(--color-text-subtle);
    }

    .textarea-reflection:focus {
      border-bottom-color: var(--color-border-strong);
    }

    .card {
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: var(--space-lg);
    }

    .card-deck {
      padding: var(--space-md);
      cursor: pointer;
      transition: box-shadow var(--duration-normal) var(--ease-out),
                  border-color var(--duration-normal) var(--ease-out);
    }

    .card-deck:hover {
      border-color: var(--color-border-strong);
      box-shadow: var(--shadow-md);
    }

    .card-prompt {
      padding: var(--space-xl);
    }

    .deck-label {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .deck-indicator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--deck-indicator-size);
      height: var(--deck-indicator-size);
      flex-shrink: 0;
    }

    .deck-indicator svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .transition-base {
      transition: opacity var(--duration-normal) var(--ease-out),
                  transform var(--duration-normal) var(--ease-out);
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(var(--reveal-distance));
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reveal {
      animation: reveal var(--duration-slow) var(--ease-out) both;
    }

    .view {
      position: relative;
      width: 100%;
      height: 100%;
      padding: var(--space-xl) var(--space-lg);
      overflow: hidden;
    }

    .view--hidden {
      display: none;
    }

    /* Loading screen */
    .loading-screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--color-bg);
      z-index: 10;
      opacity: 1;
      transition: opacity var(--duration-slow) var(--ease-out);
    }

    .loading-screen--done {
      opacity: 0;
      pointer-events: none;
    }

    .loading-shapes {
      position: relative;
      width: 64px;
      height: 64px;
    }

    .loading-shape {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      margin: -6px 0 0 -6px;
      animation: orbit 1.5s var(--ease-in-out) infinite;
    }

    .loading-shape svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .loading-shape--triangle { animation-delay: 0s; color: var(--deck-inspiration); }
    .loading-shape--hexagon { animation-delay: -0.375s; color: var(--deck-connections); }
    .loading-shape--square { animation-delay: -0.75s; color: var(--deck-interfacing); }
    .loading-shape--dot { animation-delay: -1.125s; color: var(--deck-thread); }

    @keyframes orbit {
      0%, 100% {
        transform: rotate(0deg) translateX(22px) rotate(0deg);
        opacity: 0.35;
      }
      25% {
        opacity: 1;
      }
      50% {
        transform: rotate(180deg) translateX(22px) rotate(-180deg);
        opacity: 0.35;
      }
      75% {
        opacity: 1;
      }
    }

    /* View 1 — Anchor */
    .view-1 {
      display: flex;
      flex-direction: column;
    }

    .view-1__content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      min-height: 0;
    }

    .view-1__heading {
      margin: 0;
      font-family: var(--font-ui);
      font-size: var(--text-lg);
      font-weight: var(--weight-semibold);
      line-height: var(--leading-tight);
      color: var(--color-text);
    }

    .view-1__subtext {
      margin: 0;
      text-align: left;
    }

    .view-1__pick--hidden,
    .view-1__selected--hidden {
      display: none;
    }

    .view-1__pick {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      align-items: stretch;
    }

    .view-1__pick .btn-primary {
      width: 100%;
      cursor: default;
      pointer-events: none;
    }

    .view-1__cta {
      margin: 0;
      text-align: center;
    }

    .view-1__hint {
      margin: 0;
      text-align: left;
    }

    .view-1__hint--error {
      color: var(--color-text-subtle);
    }

    .view-1__hint--hidden {
      display: none;
    }

    .view-1__selected {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      min-height: 0;
    }

    .frame-preview {
      width: 100%;
      max-height: 160px;
      min-height: 120px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background-color: var(--color-surface);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-md);
      gap: var(--space-sm);
    }

    .frame-preview__thumb {
      flex: 1;
      width: 100%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--color-bg);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .frame-preview__thumb img {
      display: block;
      width: 100%;
      max-height: 160px;
      object-fit: contain;
    }

    .frame-preview__icon {
      width: 48px;
      height: 48px;
      color: var(--color-text-subtle);
    }

    .frame-preview__meta {
      margin: 0;
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      text-align: center;
    }

    .frame-preview__name {
      margin: 0;
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--color-text-muted);
      text-align: center;
      word-break: break-word;
    }

    .frame-preview__name--hidden {
      display: none;
    }

    .view-1__name-label {
      margin: 0;
    }

    .anchor-input {
      display: block;
      width: 100%;
      padding: var(--space-sm) 0;
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: var(--weight-medium);
      line-height: var(--leading-normal);
      color: var(--color-text);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--color-border-strong);
      outline: none;
    }

    .anchor-input::placeholder {
      color: var(--color-text-subtle);
    }

    .text-btn {
      align-self: flex-start;
      padding: 0;
      border: none;
      background: none;
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: var(--weight-regular);
      color: var(--color-text-muted);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .text-btn:hover {
      color: var(--color-text);
    }

    .nav-arrow {
      position: absolute;
      right: var(--space-lg);
      bottom: var(--space-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      padding: 0;
      border: 1px solid var(--color-border-strong);
      border-radius: 50%;
      background-color: var(--color-btn-primary-bg);
      color: var(--color-btn-primary-text);
      cursor: pointer;
      transition: opacity var(--duration-fast) var(--ease-out),
                  background-color var(--duration-fast) var(--ease-out);
    }

    .nav-arrow:hover:not(:disabled) {
      opacity: 0.85;
    }

    .nav-arrow:disabled {
      background-color: var(--color-btn-disabled-bg);
      color: var(--color-btn-disabled-text);
      border-color: transparent;
      cursor: not-allowed;
    }

    .nav-arrow svg {
      display: block;
      width: 18px;
      height: 18px;
    }

    .view-stub {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="loading-screen" class="loading-screen" aria-hidden="true">
    <div class="loading-shapes">
      <span class="loading-shape loading-shape--triangle">
        <svg viewBox="0 0 12 12" aria-hidden="true"><polygon points="6,1 11,11 1,11" fill="currentColor"/></svg>
      </span>
      <span class="loading-shape loading-shape--hexagon">
        <svg viewBox="0 0 12 12" aria-hidden="true"><polygon points="6,0.5 11,3.25 11,8.75 6,11.5 1,8.75 1,3.25" fill="currentColor"/></svg>
      </span>
      <span class="loading-shape loading-shape--square">
        <svg viewBox="0 0 12 12" aria-hidden="true"><rect x="1" y="1" width="10" height="10" fill="currentColor"/></svg>
      </span>
      <span class="loading-shape loading-shape--dot">
        <svg viewBox="0 0 12 12" aria-hidden="true"><circle cx="6" cy="6" r="4" fill="currentColor"/></svg>
      </span>
    </div>
  </div>

  <div id="view-1" class="view view-1 view--hidden">
    <div class="view-1__content">
      <h1 class="view-1__heading">What stayed with you today?</h1>

      <div id="view-1-pick" class="view-1__pick">
        <p class="view-1__cta btn btn-primary" role="status">Click any frame in your file</p>
        <p class="view-1__subtext text-muted">Select a frame, component, or token from your Figma file to start.</p>
      </div>

      <div id="view-1-selected" class="view-1__selected view-1__selected--hidden">
        <div id="frame-preview" class="frame-preview">
          <div class="frame-preview__thumb">
            <img id="frame-preview-img" alt="" hidden>
            <svg id="frame-preview-icon" class="frame-preview__icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <rect x="8" y="8" width="32" height="32" rx="2"/>
              <path d="M8 16h32"/>
            </svg>
          </div>
          <p id="frame-preview-fallback" class="frame-preview__name frame-preview__name--hidden"></p>
        </div>

        <label for="anchor-name-input" class="view-1__name-label text-label">Give it your own name.</label>
        <input type="text" id="anchor-name-input" class="anchor-input" placeholder="Give it your own name.">

        <button type="button" id="clear-selection-btn" class="text-btn">Remove selection</button>
      </div>
    </div>

    <button type="button" id="view-1-next" class="nav-arrow" disabled aria-label="Continue">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </button>
  </div>

  <div id="view-2" class="view view--hidden">
    <div class="view-stub">
      <p class="text-muted">Draw — Step 5</p>
    </div>
  </div>

  <script>
    const LOADING_DURATION = 1500;

    const loadingScreen = document.getElementById('loading-screen');
    const view1 = document.getElementById('view-1');
    const view2 = document.getElementById('view-2');
    const view1Pick = document.getElementById('view-1-pick');
    const view1Selected = document.getElementById('view-1-selected');
    const framePreviewFallback = document.getElementById('frame-preview-fallback');
    const framePreviewImg = document.getElementById('frame-preview-img');
    const framePreviewIcon = document.getElementById('frame-preview-icon');
    const anchorNameInput = document.getElementById('anchor-name-input');
    const clearSelectionBtn = document.getElementById('clear-selection-btn');
    const view1Next = document.getElementById('view-1-next');

    let selection = null;
    let anchorTitle = '';

    function showView(el) {
      el.classList.remove('view--hidden');
    }

    function hideView(el) {
      el.classList.add('view--hidden');
    }

    function updateNavState() {
      view1Next.disabled = !selection;
    }

    function showPickState() {
      view1Pick.classList.remove('view-1__pick--hidden');
      view1Selected.classList.add('view-1__selected--hidden');
      updateNavState();
    }

    function showSelectedState() {
      view1Pick.classList.add('view-1__pick--hidden');
      view1Selected.classList.remove('view-1__selected--hidden');
      updateNavState();
    }

    function applySelection(data) {
      selection = { name: data.name, type: data.type, image: data.image };
      anchorTitle = data.name;
      anchorNameInput.value = data.name;

      if (data.image) {
        framePreviewImg.src = 'data:image/png;base64,' + data.image;
        framePreviewImg.hidden = false;
        framePreviewIcon.hidden = true;
        framePreviewFallback.classList.add('frame-preview__name--hidden');
      } else {
        framePreviewImg.hidden = true;
        framePreviewImg.removeAttribute('src');
        framePreviewIcon.hidden = false;
        framePreviewFallback.textContent = data.name;
        framePreviewFallback.classList.remove('frame-preview__name--hidden');
      }

      showSelectedState();
    }

    function clearSelection() {
      selection = null;
      anchorTitle = '';
      anchorNameInput.value = '';
      framePreviewImg.hidden = true;
      framePreviewImg.removeAttribute('src');
      framePreviewIcon.hidden = false;
      framePreviewFallback.textContent = '';
      framePreviewFallback.classList.add('frame-preview__name--hidden');
      showPickState();
    }

    setTimeout(() => {
      loadingScreen.classList.add('loading-screen--done');
      showView(view1);
      setTimeout(() => {
        loadingScreen.remove();
      }, 400);
    }, LOADING_DURATION);

    anchorNameInput.addEventListener('input', () => {
      anchorTitle = anchorNameInput.value;
    });

    clearSelectionBtn.addEventListener('click', clearSelection);

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'selection-cleared') {
        clearSelection();
        return;
      }

      if (msg.type === 'selection' && msg.data) {
        applySelection(msg.data);
      }
    };

    view1Next.addEventListener('click', () => {
      if (!selection) return;
      hideView(view1);
      showView(view2);
    });
  </script>
</body>
</html>
